<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="container">
      <a class="site-logo" href="{{ '/' | relative_url }}">
        <span class="logo-ta">சர்வம் நீ</span>
        <span class="logo-en">SarvamNee</span>
      </a>
      <nav class="site-nav">
        <input type="checkbox" id="nav-toggle">
        <label for="nav-toggle" class="nav-burger">&#9776;</label>
        <ul class="nav-links">
          <li><a href="{{ '/' | relative_url }}">முகப்பு</a></li>
          <li><a href="{{ '/categories/murugan' | relative_url }}">முருகன்</a></li>
          <li><a href="{{ '/categories/shiva' | relative_url }}">சிவன்</a></li>
          <li><a href="{{ '/categories/vishnu' | relative_url }}">விஷ்ணு</a></li>
          <li><a href="{{ '/categories/amman' | relative_url }}">அம்மன்</a></li>
          <li><a href="{{ '/categories/narayaniyam' | relative_url }}">நாராயணீயம்</a></li>
          <li><a href="{{ '/categories/thevaram' | relative_url }}">தேவாரம்</a></li>
          <li><a href="{{ '/categories/viratham' | relative_url }}">விரதங்கள்</a></li>
          <li><a href="{{ '/youtube' | relative_url }}">YouTube</a></li>
          <li><a href="{{ '/about' | relative_url }}">எங்களை பற்றி</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="site-main">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container">
      <p>
        &copy; {{ 'now' | date: "%Y" }} SarvamNee &mdash; சர்வம் நீ |
        Tamil Devotional Content
      </p>
      <p>
        <a href="https://www.youtube.com/@SarvamNee" target="_blank" rel="noopener">YouTube Channel</a>
      </p>
    </div>
  </footer>

</body>
</html>
